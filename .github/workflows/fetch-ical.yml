on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # This installs PostCSS and ensures binaries are executable
        run: |
          npm install
          chmod -R +x node_modules/.bin


      - name: Fetch Airbnb iCal
        run: |
          mkdir -p static
          curl -L "https://www.airbnb.ch/calendar/ical/9100496.ics?s=c4ec1809b88fb4e985ccca4e00593f2a" \
            -o static/calendar.ics

      - name: Setup Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.122.0/hugo_extended_0.122.0_linux-amd64.deb
          sudo dpkg -i hugo_extended_0.122.0_linux-amd64.deb
          hugo version

      - name: Cache Hugo resources
        uses: actions/cache@v4
        with:
          path: resources/_gen
          key: hugo-resources-${{ hashFiles('content/gallery/**') }}
          restore-keys: |
            hugo-resources-
      
      - name: Build site
        # We add the node_modules bin to the path just in case Hugo is picky
        run: |
          export PATH=$PATH:$(pwd)/node_modules/.bin
          hugo --minify

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages