on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        # This installs PostCSS and ensures binaries are executable
        run: |
          npm install
          chmod -R +x node_modules/.bin


      - name: Fetch Airbnb iCal
        run: |
          mkdir -p static
          curl -L "https://www.airbnb.ch/calendar/ical/9100496.ics?s=c4ec1809b88fb4e985ccca4e00593f2a" \
            -o static/calendar.ics

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          # v0.122.0 is the last version that supports your gallery theme's use of .Meta
          hugo-version: '0.122.0'
          extended: true

      - name: Build site
        # We add the node_modules bin to the path just in case Hugo is picky
        run: |
          export PATH=$PATH:$(pwd)/node_modules/.bin
          hugo --minify

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages