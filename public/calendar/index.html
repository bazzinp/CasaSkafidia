    #cal-status {
      text-align: center;

    .cal-months-grid {

      gap: 1.5rem;

    .cal-month-card {
      background: var(--cal-card-bg);
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1.1rem;
      box-shadow: 0 1px 8px rgba(0,0,0,0.05);
      animation: calFadeUp 0.35s ease both;
    }
    @keyframes calFadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }

    .cal-month-title {
      font-size: 0.9rem;

    .cal-weekday-row,

    .cal-weekday-row { margin-bottom: 3px; }

    .cal-weekday-label {

    .cal-day {

<script>
(async () => {
  const resp = await fetch('/calendar.ics');

  const statusEl = document.getElementById('cal-status');
  const gridEl   = document.getElementById('cal-months-grid');
  const syncEl   = document.getElementById('cal-sync-note');

  function parseIcalDate(s) {
    return new Date(+s.slice(0,4), +s.slice(4,6) - 1, +s.slice(6,8));
  }

  function parseIcal(text) {
    const events = [];
    const blocks = text.split('BEGIN:VEVENT');
    blocks.shift();
    for (const block of blocks) {
      const summary = (block.match(/SUMMARY:(.+)/)?.[1] || '').trim();
      const dtstart = block.match(/DTSTART[^:]*:(\d{8})/)?.[1];
      const dtend   = block.match(/DTEND[^:]*:(\d{8})/)?.[1];
      if (!dtstart || !dtend) continue;
      const isReserved = summary.toLowerCase().includes('reserved');
      events.push({
        start: parseIcalDate(dtstart),
        end:   parseIcalDate(dtend), 
        type:  isReserved ? 'reserved' : 'unavailable',
        tip:   isReserved ? 'Reserved' : 'Not available'
      });
    }
    return events;
  }

  function statusForDate(d, events) {
    for (const ev of events) {
      if (d >= ev.start && d < ev.end) return { cls: ev.type, tip: ev.tip };
    }
    return { cls: 'free', tip: 'Available' };
  }

  function renderMonth(year, month, events, today) {
    const WEEKDAYS   = ['Mo','Tu','We','Th','Fr','Sa','Su'];
    const MONTH_NAMES = ['January','February','March','April','May','June',
                         'July','August','September','October','November','December'];

    const card = document.createElement('div');
    card.className = 'cal-month-card';
    card.style.animationDelay = (month % 4) * 0.06 + 's';

    const title = document.createElement('div');
    title.className = 'cal-month-title';
    title.textContent = `${MONTH_NAMES[month]} ${year}`;
    card.appendChild(title);

    
    const wRow = document.createElement('div');
    wRow.className = 'cal-weekday-row';
    WEEKDAYS.forEach(d => {
      const lbl = document.createElement('div');
      lbl.className = 'cal-weekday-label';
      lbl.textContent = d;
      wRow.appendChild(lbl);
    });
    card.appendChild(wRow);

    
    const dGrid = document.createElement('div');
    dGrid.className = 'cal-days-grid';

    const firstDow = (new Date(year, month, 1).getDay() + 6) % 7; 
    for (let i = 0; i < firstDow; i++) {
      const e = document.createElement('div');
      e.className = 'cal-day empty';
      dGrid.appendChild(e);
    }

    const daysInMonth = new Date(year, month + 1, 0).getDate();
    for (let d = 1; d <= daysInMonth; d++) {
      const date = new Date(year, month, d);
      const { cls, tip } = statusForDate(date, events);
      const cell = document.createElement('div');
      cell.className = 'cal-day ' + cls;
      if (date < today) cell.classList.add('past');
      if (date.toDateString() === today.toDateString()) cell.classList.add('today');
      cell.textContent = d;
      cell.setAttribute('data-tip', tip);
      dGrid.appendChild(cell);
    }

    card.appendChild(dGrid);
    return card;
  }

  try {
    const resp = await fetch('/calendar.ics');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const events = parseIcal(text);

    statusEl.textContent = '';
    syncEl.textContent = 'Last synced: ' + new Date().toLocaleString();

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    for (let i = 0; i < 12; i++) {
      const d = new Date(today.getFullYear(), today.getMonth() + i, 1);
      gridEl.appendChild(renderMonth(d.getFullYear(), d.getMonth(), events, today));
    }
  } catch (err) {
    statusEl.textContent = '';
    gridEl.innerHTML = `<div class="cal-error">
      Could not load calendar — please refresh the page.<br>
      <small style="opacity:.6">${err.message}</small>
    </div>`;
    console.error('Calendar error:', err);
  }
})();
</script>
